<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect width="128" height="128" rx="24" fill="url(#grad)"/>
  
  <!-- CF text -->
  <text x="64" y="58" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">CF</text>
  
  <!-- Counter circle -->
  <circle cx="64" cy="95" r="22" fill="white" opacity="0.9"/>
  <text x="64" y="103" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#667eea" text-anchor="middle">24</text>
</svg>
